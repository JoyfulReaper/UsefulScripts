name: joyful-stack

services:
  rabbitmq:
    image: rabbitmq:4-management
    hostname: rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: "/mission-control"

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      - backend

  gateway:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.gateway

    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-gateway-production

      EventSources__Sources__0__Name: happygopher-production
      EventSources__Sources__0__ApiKey: ${HAPPYGOPHER_MISSION_CONTROL_KEY}

      EventSources__Sources__1__Name: happyfinger-production
      EventSources__Sources__1__ApiKey: ${HAPPYFINGER_MISSION_CONTROL_KEY}

      EventSources__Sources__2__Name: kgivler-api-production
      EventSources__Sources__2__ApiKey: ${KGIVLER_API_MISSION_CONTROL_KEY}

    depends_on:
      rabbitmq:
        condition: service_healthy

    ports:
      - "127.0.0.1:5190:8080"

    networks:
      - backend

  archive:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.archive

    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-archive-production

      EventArchive__DatabaseFileName: mission-control.db
      EventArchive__BasePath: /data

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - archive-data:/data

    ports:
      - "127.0.0.1:5191:8080"

    networks:
      - backend

  happyfinger:
    build:
      context: ./HappyFinger
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DOTNET_ENVIRONMENT: Production

      Finger__ListenAddress: 0.0.0.0
      Finger__Port: 79
      Finger__MaxConcurrentConnections: 64
      Finger__RequestTimeoutSeconds: 15
      Finger__TelemetryIgnoredRemoteAddress: "172.21.0.1"

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYFINGER_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    ports:
      - "79:79/tcp"

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_started

    networks:
      - backend

  happygopher:
    build:
      context: ./HappyGopher
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DOTNET_ENVIRONMENT: Production

      Gopher__ListenAddress: 0.0.0.0
      Gopher__Port: 70
      Gopher__PublicHost: gopher.kgivler.com
      Gopher__ContentRoot: /app/content
      Gopher__MaxConcurrentConnections: 64
      Gopher__MaxSelectorBytes: 4096
      Gopher__RequestTimeoutSeconds: 15

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYGOPHER_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    volumes:
       - /var/lib/happygopher/content:/app/content:ro

    ports:
      - "70:70/tcp"

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_started

    networks:
      - backend

networks:
  backend:

volumes:
  rabbitmq-data:
  archive-data:
