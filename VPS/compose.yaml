name: joyful-stack

services:
  happyqotd:
    build:
      context: ./HappyQOTD
      dockerfile: Dockerfile

    restart: unless-stopped
    init: true

    network_mode: host

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:5193

      QOTD__ListenAddress: 0.0.0.0
      QOTD__Port: 17
      QOTD__ApiBaseUrl: http://127.0.0.1:5193
      QOTD__MaxConcurrentConnections: 64
      QOTD__RequestTimeoutSeconds: 15
      
      QOTD__TelemetryIgnoredRemoteAddresses__0: "172.21.0.1"
      QOTD__TelemetryIgnoredRemoteAddresses__1: "127.0.0.1"

      QotdSecurity__AdminApiKey: ${HAPPYQOTD_ADMIN_API_KEY}

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://127.0.0.1:5190
      MissionControl__ApiKey: ${HAPPYQOTD_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

      DOTNET_EnableDiagnostics: "0"

    volumes:
      - /var/lib/happyqotd/data:/app/Data

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_started

  gitactivity:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.gitactivity

    restart: unless-stopped
    init: true

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-git-activity-production

      RabbitMqConsumer__ExchangeName: kgivler.events
      RabbitMqConsumer__QueueName: mission-control.git-activity
      RabbitMqConsumer__RoutingKey: github.push.received
      RabbitMqConsumer__PrefetchCount: 10

      GitActivity__DatabaseFileName: git-activity.db
      GitActivity__BasePath: /data
      GitActivity__ApiKey: ${GITACTIVITY_API_KEY}

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - gitactivity-data:/data

    ports:
      - "127.0.0.1:5192:8080"

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

  happyecho:
    build:
      context: ./HappyEcho
      dockerfile: Dockerfile

    restart: unless-stopped
    init: true

    environment:
      DOTNET_ENVIRONMENT: Production

      Echo__ListenAddress: 0.0.0.0
      Echo__Port: 7
      Echo__MaxConcurrentConnections: 64
      Echo__RequestTimeoutSeconds: 15
      Echo__MaxBytesPerConnection: 1048576
      Echo__TelemetryIgnoredRemoteAddress: "172.21.0.1"
      Echo__BlockLoopbackConnections: true

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYECHO_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    ports:
      - "7:7/tcp"

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_started

    networks:
      - backend

  rabbitmq:
    image: rabbitmq:4-management
    hostname: rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: "/mission-control"

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      - backend

  gateway:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.gateway

    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      GitHubWebhook__Enabled: "true"
      GitHubWebhook__Secret: "${GITHUB_WEBHOOK_SECRET}"
      GitHubWebhook__AllowedOwner: "JoyfulReaper"
      GitHubWebhook__MaxPayloadBytes: "1048576"

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-gateway-production

      EventSources__Sources__0__Name: happygopher-production
      EventSources__Sources__0__ApiKey: ${HAPPYGOPHER_MISSION_CONTROL_KEY}

      EventSources__Sources__1__Name: happyfinger-production
      EventSources__Sources__1__ApiKey: ${HAPPYFINGER_MISSION_CONTROL_KEY}

      EventSources__Sources__2__Name: kgivler-api-production
      EventSources__Sources__2__ApiKey: ${KGIVLER_API_MISSION_CONTROL_KEY}

      EventSources__Sources__3__Name: randomsteam-production
      EventSources__Sources__3__ApiKey: ${RANDOMSTEAM_MISSION_CONTROL_KEY}

      EventSources__Sources__4__Name: happyecho-production
      EventSources__Sources__4__ApiKey: ${HAPPYECHO_MISSION_CONTROL_KEY}

      EventSources__Sources__5__Name: happyqotd-production
      EventSources__Sources__5__ApiKey: ${HAPPYQOTD_MISSION_CONTROL_KEY}

      EventSources__Sources__6__Name: missioncontrol-agent-production
      EventSources__Sources__6__ApiKey: ${MISSIONCONTROL_AGENT_MISSION_CONTROL_KEY}

    depends_on:
      rabbitmq:
        condition: service_healthy

    ports:
      - "127.0.0.1:5190:8080"

    networks:
      - backend

  archive:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.archive

    restart: unless-stopped

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-archive-production

      EventArchive__DatabaseFileName: mission-control.db
      EventArchive__BasePath: /data

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - archive-data:/data

    ports:
      - "127.0.0.1:5191:8080"

    networks:
      - backend

  randomsteam:
    image: joyful/randomsteam:${RANDOMSTEAM_IMAGE_TAG}

    build:
      context: ./RandomSteamGame
      dockerfile: Dockerfile

    restart: unless-stopped
    init: true

    # This deliberately preserves the application's current
    # loopback-only forwarded-header trust model.
    network_mode: host

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:5182

      Steam__ApiKey: ${RANDOMSTEAM_STEAM_API_KEY}
      Steam__ConnectionString: Data Source=steam_cache.db

      DataProtection__ApplicationName: RandomSteamGame
      DataProtection__KeysPath: /data-protection

      Application__CommitSha: ${RANDOMSTEAM_COMMIT_SHA}
      Application__DeploymentType: docker

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://127.0.0.1:5190
      MissionControl__ApiKey: ${RANDOMSTEAM_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

      DOTNET_EnableDiagnostics: "0"

    volumes:
      - /var/lib/randomsteam/data:/app/Data
      - /var/lib/randomsteam/data-protection:/data-protection

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://127.0.0.1:5182/health/live"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_started

  happyfinger:
    build:
      context: ./HappyFinger
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DOTNET_ENVIRONMENT: Production

      PlanFile__Path: "/data/happyfinger/.plan"
      PlanFile__MaxBytes: "16384"

      FingerContent__OverrideDirectory: "/data/happyfinger/records"
      FingerContent__MaxBytes: "16384"

      RandomSteamGame__BaseUrl: "https://randomsteam.kgivler.com/"
      RandomSteamGame__TimeoutSeconds: "5"

      Finger__ListenAddress: 0.0.0.0
      Finger__Port: 79
      Finger__MaxConcurrentConnections: 64
      Finger__RequestTimeoutSeconds: 15
      Finger__TelemetryIgnoredRemoteAddress: "172.21.0.1"

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYFINGER_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    ports:
      - "79:79/tcp"

    volumes:
      - ./data/happyfinger:/data/happyfinger:ro

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_started

    networks:
      - backend

  happygopher:
    build:
      context: ./HappyGopher
      dockerfile: Dockerfile

    restart: unless-stopped

    environment:
      DOTNET_ENVIRONMENT: Production

      Gopher__ListenAddress: 0.0.0.0
      Gopher__Port: 70
      Gopher__PublicHost: gopher.kgivler.com
      Gopher__ContentRoot: /app/content
      Gopher__MaxConcurrentConnections: 64
      Gopher__MaxSelectorBytes: 4096
      Gopher__RequestTimeoutSeconds: 15
      Gopher__TelemetryIgnoredRemoteAddress: "172.21.0.1"

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYGOPHER_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    volumes:
       - /var/lib/happygopher/content:/app/content:ro

    ports:
      - "70:70/tcp"

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_started

    networks:
      - backend

networks:
  backend:

volumes:
  rabbitmq-data:
  archive-data:
  gitactivity-data:
