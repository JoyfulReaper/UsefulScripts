
name: joyful-stack

services:
  ntfy:

    deploy:
      resources:
        limits:
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    image: binwiederhier/ntfy:v2.26.0
    command:
      - serve
    environment:
      TZ: America/New_York
    volumes:
      - ./config/ntfy:/etc/ntfy:ro
      - ./data/ntfy:/var/lib/ntfy
    expose:
      - "80"
    ports:
      - "127.0.0.1:5197:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -q '\"healthy\":true' || exit 1"
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    init: true

  happyqotd:
    deploy:
      resources:
        limits:
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    build:
      context: ./HappyQOTD
      dockerfile: Dockerfile

    restart: unless-stopped
    init: true

    network_mode: host

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:5193/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s


    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:5193

      QOTD__ListenAddress: 0.0.0.0
      QOTD__Port: 17
      QOTD__ApiBaseUrl: http://127.0.0.1:5193
      QOTD__MaxConcurrentConnections: 64
      QOTD__RequestTimeoutSeconds: 15

      QOTD__TelemetryIgnoredRemoteAddresses__0: "172.21.0.1"
      QOTD__TelemetryIgnoredRemoteAddresses__1: "127.0.0.1"
      QOTD__TelemetryIgnoredRemoteAddresses__2: "172.21.0.4"

      QotdSecurity__AdminApiKey: ${HAPPYQOTD_ADMIN_API_KEY}

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://127.0.0.1:5190
      MissionControl__ApiKey: ${HAPPYQOTD_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

      DOTNET_EnableDiagnostics: "0"

    volumes:
      - /var/lib/happyqotd/data:/app/Data

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_healthy

  gitactivity:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.gitactivity

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


    deploy:
      resources:
        limits:
          memory: 256M

    restart: unless-stopped
    init: true

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-git-activity-production

      RabbitMqConsumer__ExchangeName: kgivler.events
      RabbitMqConsumer__QueueName: mission-control.git-activity
      RabbitMqConsumer__RoutingKey: github.push.received
      RabbitMqConsumer__PrefetchCount: 10

      GitActivity__DatabaseFileName: git-activity.db
      GitActivity__BasePath: /data
      GitActivity__ApiKey: ${GITACTIVITY_API_KEY}

      GitActivity__AllowedRepositories__0: JoyfulReaper/MissionControl
      GitActivity__AllowedRepositories__1: JoyfulReaper/RandomSteamGame
      GitActivity__AllowedRepositories__2: JoyfulReaper/ReaperShell
      GitActivity__AllowedRepositories__3: JoyfulReaper/HappyQOTD
      GitActivity__AllowedRepositories__4: JoyfulReaper/HappyFinger
      GitActivity__AllowedRepositories__5: JoyfulReaper/HappyEcho
      GitActivity__AllowedRepositories__6: JoyfulReaper/kgivler_com
      GitActivity__AllowedRepositories__7: JoyfulReaper/HappyGopher
      GitActivity__AllowedRepositories__8: JoyfulReaper/JoyfulReaperLib
      GitActivity__AllowedRepositories__9: JoyfulReaper/Rimworld-ReplaceStuff
      GitActivity__AllowedRepositories__10: JoyfulReaper/TheGodsAreReal
      GitActivity__AllowedRepositories__11: JoyfulReaper/PanicZoneToggler
      GitActivity__AllowedRepositories__12: JoyfulReaper/DivineIntervention
      GitActivity__AllowedRepositories__13: JoyfulReaper/BetterTradeColors
      GitActivity__AllowedRepositories__14: JoyfulReaper/ScreenLapse
      GitActivity__AllowedRepositories__15: JoyfulReaper/WhatShouldIWorkOnToday
      GitActivity__AllowedRepositories__16: JoyfulReaper/UsefulScripts
      GitActivity__AllowedRepositories__17: JoyfulReaper/HappyDaytime
      GitActivity__AllowedRepositories__18: JoyfulReaper/Mycelium

      GitActivity__AllowedBranches__0: main
      GitActivity__AllowedBranches__1: master
      GitActivity__AllowedBranches__2: dev
      GitActivity__AllowedBranches__3: feature-dashboard

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - gitactivity-data:/data

    ports:
      - "127.0.0.1:5192:8080"

    cap_drop:
      - ALL

    tmpfs:
      - /tmp

    read_only: true

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s


  happyecho:
    build:
      context: ./HappyEcho
      dockerfile: Dockerfile

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


    deploy:
      resources:
        limits:
          memory: 128M


    restart: unless-stopped
    init: true

    environment:
      DOTNET_ENVIRONMENT: Production

      Echo__ListenAddress: 0.0.0.0
      Echo__Port: 7
      Echo__MaxConcurrentConnections: 64
      Echo__RequestTimeoutSeconds: 15
      Echo__MaxBytesPerConnection: 1048576
      Echo__TelemetryIgnoredRemoteAddress: "172.21.0.1"
      Echo__BlockLoopbackConnections: true

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYECHO_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    ports:
      - "7:7/tcp"

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_healthy

    networks:
      - backend

  rabbitmq:
    image: rabbitmq:4-management
    hostname: rabbitmq
    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 768M


    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: "/mission-control"

    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

    networks:
      - backend

  gateway:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.gateway

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


    deploy:
      resources:
        limits:
          memory: 256M


    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      GitHubWebhook__Enabled: "true"
      GitHubWebhook__Secret: "${GITHUB_WEBHOOK_SECRET}"
      GitHubWebhook__AllowedOwner: "JoyfulReaper"
      GitHubWebhook__MaxPayloadBytes: "1048576"

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-gateway-production

      EventSources__Sources__0__Name: happygopher-production
      EventSources__Sources__0__ApiKey: ${HAPPYGOPHER_MISSION_CONTROL_KEY}

      EventSources__Sources__1__Name: happyfinger-production
      EventSources__Sources__1__ApiKey: ${HAPPYFINGER_MISSION_CONTROL_KEY}

      EventSources__Sources__2__Name: kgivler-api-production
      EventSources__Sources__2__ApiKey: ${KGIVLER_API_MISSION_CONTROL_KEY}

      EventSources__Sources__3__Name: randomsteam-production
      EventSources__Sources__3__ApiKey: ${RANDOMSTEAM_MISSION_CONTROL_KEY}

      EventSources__Sources__4__Name: happyecho-production
      EventSources__Sources__4__ApiKey: ${HAPPYECHO_MISSION_CONTROL_KEY}

      EventSources__Sources__5__Name: happyqotd-production
      EventSources__Sources__5__ApiKey: ${HAPPYQOTD_MISSION_CONTROL_KEY}

      EventSources__Sources__6__Name: missioncontrol-agent-production
      EventSources__Sources__6__ApiKey: ${MISSIONCONTROL_AGENT_MISSION_CONTROL_KEY}

      EventSources__Sources__7__Name: happydaytime-production
      EventSources__Sources__7__ApiKey: ${HAPPYDAYTIME_MISSION_CONTROL_KEY}

      EventSources__Sources__8__Name: missioncontrol-dashboard-production
      EventSources__Sources__8__ApiKey: ${MISSIONCONTROL_DASHBOARD_MISSION_CONTROL_KEY}

    depends_on:
      rabbitmq:
        condition: service_healthy

    ports:
      - "127.0.0.1:5190:8080"

    networks:
      - backend

  archive:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.archive

    restart: unless-stopped

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


    deploy:
      resources:
        limits:
          memory: 256M

    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s


    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080

      RabbitMq__HostName: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: ${RABBITMQ_USER}
      RabbitMq__Password: ${RABBITMQ_PASSWORD}
      RabbitMq__VirtualHost: "/mission-control"
      RabbitMq__ClientProvidedName: mission-control-archive-production

      EventArchive__DatabaseFileName: mission-control.db
      EventArchive__BasePath: /data

    depends_on:
      rabbitmq:
        condition: service_healthy

    volumes:
      - archive-data:/data

    ports:
      - "127.0.0.1:5191:8080"

    networks:
      - backend

  dashboard:
    build:
      context: ./MissionControl
      dockerfile: Dockerfile.dashboard

    restart: unless-stopped
    init: true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 512M

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"

      Archive__BaseUrl: http://archive:8080/
      Agent__BaseUrl: https://status-api.kgivler.com/

      GitActivityApi__Enabled: "true"
      GitActivityApi__BaseUrl: http://gitactivity:8080/
      GitActivityApi__ApiKey: ${GITACTIVITY_API_KEY}

      Dashboard__Authentication__DatabaseFileName: dashboard-auth.db
      Dashboard__Authentication__BasePath: /app/data
      Dashboard__Authentication__DataProtectionKeysPath: /app/data/data-protection
      Dashboard__Authentication__CookieLifetimeHours: 8
      Dashboard__Authentication__MaxFailedAttempts: 5
      Dashboard__Authentication__LockoutMinutes: 15

      Dashboard__MobileApi__Enabled: "true"
      Dashboard__MobileApi__TokenHash: ${DASHBOARD_MOBILE_API_TOKEN_HASH}

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${MISSIONCONTROL_DASHBOARD_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

      DOTNET_EnableDiagnostics: "0"

    depends_on:
      gateway:
        condition: service_healthy
      archive:
        condition: service_healthy
      gitactivity:
        condition: service_healthy

    volumes:
      - dashboard-data:/app/data

    ports:
      - "127.0.0.1:5195:8080"

    cap_drop:
      - ALL

    tmpfs:
      - /tmp

    read_only: true

    security_opt:
      - no-new-privileges:true

    networks:
      - backend

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "--header",
          "X-Forwarded-Proto: https",
          "http://localhost:8080/login"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  happydaytime:
    build:
      context: ./HappyDaytime
      dockerfile: Dockerfile

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 128M

    restart: unless-stopped
    init: true

    environment:
      DOTNET_ENVIRONMENT: Production

      Daytime__ListenAddress: 0.0.0.0
      Daytime__Port: 13
      Daytime__MaxConcurrentConnections: 64
      Daytime__TelemetryIgnoredRemoteAddress: "172.21.0.1"

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYDAYTIME_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

      DOTNET_EnableDiagnostics: "0"

    ports:
      - "13:13/tcp"

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_healthy

    networks:
      - backend

  randomsteam:
    image: joyful/randomsteam:${RANDOMSTEAM_IMAGE_TAG}

    build:
      context: ./RandomSteamGame
      dockerfile: Dockerfile

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


    restart: unless-stopped
    init: true

    deploy:
      resources:
        limits:
          memory: 768M


    # This deliberately preserves the application's current
    # loopback-only forwarded-header trust model.
    network_mode: host

    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://127.0.0.1:5182

      Steam__ApiKey: ${RANDOMSTEAM_STEAM_API_KEY}
      Steam__ConnectionString: Data Source=steam_cache.db

      DataProtection__ApplicationName: RandomSteamGame
      DataProtection__KeysPath: /data-protection

      Application__CommitSha: ${RANDOMSTEAM_COMMIT_SHA}
      Application__DeploymentType: docker

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://127.0.0.1:5190
      MissionControl__ApiKey: ${RANDOMSTEAM_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

      DOTNET_EnableDiagnostics: "0"

    volumes:
      - /var/lib/randomsteam/data:/app/Data
      - /var/lib/randomsteam/data-protection:/data-protection

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "--silent",
          "http://127.0.0.1:5182/health/live"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    cap_drop:
      - ALL

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_healthy

  happyfinger:
    build:
      context: ./HappyFinger
      dockerfile: Dockerfile

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 128M


    environment:
      DOTNET_ENVIRONMENT: Production

      PlanFile__Path: "/data/happyfinger/.plan"
      PlanFile__MaxBytes: "16384"

      FingerContent__OverrideDirectory: "/data/happyfinger/records"
      FingerContent__MaxBytes: "16384"

      RandomSteamGame__BaseUrl: "https://randomsteam.kgivler.com/"
      RandomSteamGame__TimeoutSeconds: "5"

      Finger__ListenAddress: 0.0.0.0
      Finger__Port: 79
      Finger__MaxConcurrentConnections: 64
      Finger__RequestTimeoutSeconds: 15
      Finger__TelemetryIgnoredRemoteAddress: "172.21.0.1"

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYFINGER_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    ports:
      - "79:79/tcp"

    volumes:
      - ./data/happyfinger:/data/happyfinger:ro

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_healthy

    networks:
      - backend

  happygopher:
    build:
      context: ./HappyGopher
      dockerfile: Dockerfile

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 128M


    environment:
      DOTNET_ENVIRONMENT: Production

      Gopher__ListenAddress: 0.0.0.0
      Gopher__Port: 70
      Gopher__PublicHost: gopher.kgivler.com
      Gopher__ContentRoot: /app/content
      Gopher__MaxConcurrentConnections: 64
      Gopher__MaxSelectorBytes: 4096
      Gopher__RequestTimeoutSeconds: 15
      Gopher__TelemetryIgnoredRemoteAddress: "172.21.0.1"

      MissionControl__Enabled: "true"
      MissionControl__BaseUrl: http://gateway:8080
      MissionControl__ApiKey: ${HAPPYGOPHER_MISSION_CONTROL_KEY}
      MissionControl__TimeoutMilliseconds: 1000

    volumes:
       - /var/lib/happygopher/content:/app/content:ro

    ports:
      - "70:70/tcp"

    cap_drop:
      - ALL

    cap_add:
      - NET_BIND_SERVICE

    security_opt:
      - no-new-privileges:true

    depends_on:
      gateway:
        condition: service_healthy

    networks:
      - backend

networks:
  backend:

volumes:
  rabbitmq-data:
  archive-data:
  gitactivity-data:
  dashboard-data:
